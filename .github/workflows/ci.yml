name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (if configured)
        run: pnpm -r --if-present run lint

      - name: Test (if configured)
        run: pnpm -r --if-present run test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build API
        run: pnpm --filter @flyhigh/api build

      - name: Build Web
        run: pnpm --filter @flyhigh/web build

      - name: Build Admin
        run: pnpm --filter @flyhigh/admin build

